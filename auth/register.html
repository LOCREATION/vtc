<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Inscription | LOC'RÉATION SAS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ---------- VARIABLES ---------- */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#0A1A38;
  --primary-light:#1B3A6B;
  --gold:#C8A84B;
  --gold-dark:#A8882B;
  --red:#C0392B;
  --green:#27AE60;
  --white:#fff;
  --gray:#7C7C9E;
  --gray-light:#E8E4F0;
  --gray-xlight:#F9F7FD;
  --shadow-sm:0 4px 12px rgba(10,26,56,.08);
  --shadow-md:0 6px 24px rgba(10,26,56,.12);
  --shadow-lg:0 12px 48px rgba(10,26,56,.18);
  --radius:12px;
  --radius-xl:24px;
}
body{
  font-family:'Poppins',sans-serif;
  background:var(--gray-xlight);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:clamp(1rem, 3vh, 2rem);
}
/* Carte principale */
.reg-card{
  background:var(--white);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-lg);
  width:100%;
  max-width:clamp(500px, 85vw, 680px);
  overflow:hidden;
  margin:auto;
}
/* En-tête avec dégradé */
.reg-header{
  background:linear-gradient(135deg,var(--primary),#1B3A6B);
  padding:clamp(1.5rem, 4vw, 2rem) clamp(1.5rem, 4vw, 2.5rem);
  text-align:center;
}
.reg-header h1{
  font-size:clamp(1.3rem, 4vw, 1.5rem);
  font-weight:800;
  color:var(--white);
  margin-bottom:4px;
}
.reg-header p{
  font-size:clamp(0.8rem, 2vw, 0.87rem);
  color:rgba(255,255,255,.7);
}
/* Tabs client/chauffeur */
.role-tabs{
  display:flex;
  gap:6px;
  background:rgba(255,255,255,.1);
  padding:5px;
  border-radius:var(--radius);
  margin-top:clamp(1rem, 3vh, 1.5rem);
}
.role-tab{
  flex:1;
  padding:clamp(6px, 1.5vh, 9px);
  text-align:center;
  border-radius:calc(var(--radius) - 2px);
  font-size:clamp(0.7rem, 2vw, 0.8rem);
  font-weight:600;
  color:rgba(255,255,255,.7);
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  border:none;
  background:none;
  font-family:'Poppins',sans-serif;
}
.role-tab.active{
  background:rgba(255,255,255,.2);
  color:#fff;
  border:1px solid rgba(255,255,255,.3);
}
/* Corps du formulaire */
.reg-body{
  padding:clamp(1.5rem, 4vw, 2.5rem) clamp(1.5rem, 4vw, 2.5rem);
}
.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:clamp(0.8rem, 2vw, 1rem);
  margin-bottom:clamp(0.8rem, 2vw, 1rem);
}
.form-group{
  margin-bottom:clamp(0.8rem, 2vw, 1rem);
}
.form-label{
  display:block;
  font-size:clamp(0.75rem, 2vw, 0.82rem);
  font-weight:600;
  color:var(--primary);
  margin-bottom:6px;
}
.form-icon-wrap{
  position:relative;
}
.form-icon-wrap i:first-child{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--gray);
  font-size:clamp(0.85rem, 2vw, 0.9rem);
  z-index:1;
}
.form-control{
  width:100%;
  padding:clamp(10px, 2vh, 12px) 16px clamp(10px, 2vh, 12px) 44px;
  border:1.5px solid var(--gray-light);
  border-radius:var(--radius);
  font-size:clamp(0.85rem, 2vw, 0.9rem);
  font-family:'Poppins',sans-serif;
  color:var(--primary);
  background:var(--white);
  outline:none;
  transition:all .2s;
}
.form-control:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(10,26,56,.08);
}
.toggle-pwd{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:var(--gray);
  z-index:1;
}
/* Section chauffeur */
.chauffeur-extra{
  display:none;
  margin-top:20px;
  padding-top:16px;
  border-top:1px solid var(--gray-light);
}
.chauffeur-extra.show{
  display:block;
}
.sec-div{
  font-size:clamp(0.75rem, 2vw, 0.8rem);
  font-weight:700;
  color:var(--primary);
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}
/* CGV */
.cgv-wrap{
  display:flex;
  align-items:flex-start;
  gap:12px;
  margin:20px 0;
}
.cgv-wrap input{
  width:18px;
  height:18px;
  margin-top:2px;
  accent-color:var(--primary);
  flex-shrink:0;
}
.cgv-wrap label{
  font-size:clamp(0.75rem, 2vw, 0.82rem);
  color:var(--gray);
  line-height:1.4;
}
.btn-full{
  width:100%;
  padding:clamp(12px, 2vh, 14px);
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;
  border:none;
  border-radius:var(--radius);
  font-size:clamp(0.9rem, 2vw, 0.95rem);
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:all .3s;
  font-family:'Poppins',sans-serif;
}
.btn-full:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}
.btn-full:disabled{
  opacity:.6;
  cursor:not-allowed;
}
.login-link{
  text-align:center;
  font-size:clamp(0.8rem, 2vw, 0.85rem);
  color:var(--gray);
  margin-top:20px;
}
.login-link a{
  color:var(--primary);
  font-weight:700;
  text-decoration:none;
}
.login-link a:hover{text-decoration:underline;}
/* Responsive */
@media (max-width: 600px){
  .form-row{grid-template-columns:1fr; gap:0;}
  .reg-body{padding:1.5rem;}
}
@media (min-width: 1920px){
  .reg-card{max-width:800px;}
  .form-control{font-size:1rem;}
}
</style>
</head>
<body>
<div class="reg-card">
  <div class="reg-header">
    <h1>⚡ LOC'RÉATION SAS</h1>
    <p>Créez votre compte et rejoignez la plateforme</p>
    <div class="role-tabs">
      <button class="role-tab active" data-role="client" onclick="setRole('client',this)"><i class="fas fa-user"></i>Compte Client</button>
      <button class="role-tab" data-role="chauffeur" onclick="setRole('chauffeur',this)"><i class="fas fa-car"></i>Compte Chauffeur</button>
    </div>
  </div>
  <div class="reg-body">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prénom <span style="color:var(--red)">*</span></label>
        <div class="form-icon-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="prenom" class="form-control" placeholder="Jean" autocomplete="given-name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nom <span style="color:var(--red)">*</span></label>
        <div class="form-icon-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="nom" class="form-control" placeholder="Dupont" autocomplete="family-name">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Adresse email <span style="color:var(--red)">*</span></label>
      <div class="form-icon-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" class="form-control" placeholder="votre@email.com" autocomplete="email">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <div class="form-icon-wrap">
          <i class="fas fa-phone"></i>
          <input type="tel" id="tel" class="form-control" placeholder="+33 6 XX XX XX XX" autocomplete="tel">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Ville</label>
        <div class="form-icon-wrap">
          <i class="fas fa-city"></i>
          <input type="text" id="ville" class="form-control" placeholder="Paris" autocomplete="address-level2">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe <span style="color:var(--red)">*</span></label>
      <div class="form-icon-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" class="form-control" placeholder="Min. 6 caractères" autocomplete="new-password">
        <i class="fas fa-eye toggle-pwd" onclick="togglePassword('password')"></i>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirmer le mot de passe <span style="color:var(--red)">*</span></label>
      <div class="form-icon-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="confirm" class="form-control" placeholder="Répétez votre mot de passe" autocomplete="off">
      </div>
    </div>

    <!-- SECTION CHAUFFEUR -->
    <div id="chauffeur-extra" class="chauffeur-extra">
      <div class="sec-div"><i class="fas fa-car"></i> Informations Véhicule</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Marque &amp; Modèle</label>
          <div class="form-icon-wrap">
            <i class="fas fa-car-alt"></i>
            <input type="text" id="voiture" class="form-control" placeholder="Mercedes Classe E">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Plaque d'immatriculation</label>
          <div class="form-icon-wrap">
            <i class="fas fa-id-card"></i>
            <input type="text" id="plaque" class="form-control" placeholder="AA-123-BB">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">N° Carte Professionnelle VTC</label>
        <div class="form-icon-wrap">
          <i class="fas fa-id-badge"></i>
          <input type="text" id="carte-vtc" class="form-control" placeholder="VTC-2026-XXXXX">
        </div>
      </div>
    </div>

    <!-- CGV -->
    <div class="cgv-wrap">
      <input type="checkbox" id="cgv">
      <label for="cgv">
        J'accepte les <a href="../legal/terms-of-use.html" target="_blank">Conditions Générales d'Utilisation</a>
        et la <a href="../legal/privacy-policy.html" target="_blank">Politique de Confidentialité</a>.
      </label>
    </div>

    <button class="btn-full" id="btn-register" onclick="doRegister()">
      <i class="fas fa-user-plus"></i> Créer mon compte
    </button>

    <div class="login-link">
      Déjà inscrit ? <a href="login.html">Se connecter</a>
    </div>
  </div>
</div>

<script type="module">
import { supabase, showToast, getCurrentUser, redirectToDashboard } from '../assets/js/supabase.js'

let currentRole = 'client'

// Sélection du rôle
window.setRole = (role, el) => {
  currentRole = role
  document.querySelectorAll('.role-tab').forEach(tab => tab.classList.remove('active'))
  el.classList.add('active')
  const chauffeurDiv = document.getElementById('chauffeur-extra')
  if (role === 'chauffeur') {
    chauffeurDiv.classList.add('show')
  } else {
    chauffeurDiv.classList.remove('show')
  }
}

// Afficher/masquer mot de passe
window.togglePassword = (fieldId) => {
  const input = document.getElementById(fieldId)
  const icon = input.nextElementSibling
  if (input.type === 'password') {
    input.type = 'text'
    icon.classList.remove('fa-eye')
    icon.classList.add('fa-eye-slash')
  } else {
    input.type = 'password'
    icon.classList.remove('fa-eye-slash')
    icon.classList.add('fa-eye')
  }
}

// Inscription
window.doRegister = async () => {
  const prenom = document.getElementById('prenom').value.trim()
  const nom = document.getElementById('nom').value.trim()
  const email = document.getElementById('email').value.trim()
  const tel = document.getElementById('tel').value.trim()
  const ville = document.getElementById('ville').value.trim() || 'Paris'
  const password = document.getElementById('password').value
  const confirm = document.getElementById('confirm').value
  const cgv = document.getElementById('cgv').checked

  // Validation
  if (!prenom || !nom || !email || !password) {
    showToast('Remplissez tous les champs obligatoires.', 'error')
    return
  }
  if (password.length < 6) {
    showToast('Le mot de passe doit comporter au moins 6 caractères.', 'warning')
    return
  }
  if (password !== confirm) {
    showToast('Les mots de passe ne correspondent pas.', 'error')
    return
  }
  if (!cgv) {
    showToast('Vous devez accepter les CGU et la politique de confidentialité.', 'warning')
    return
  }

  // Préparer métadonnées pour le trigger SQL (handle_new_user)
  const metadata = {
    role: currentRole,
    prenom: prenom,
    nom: nom,
    tel: tel || null,
    ville: ville
  }

  // Si chauffeur, on stockera plus tard dans employees (à faire après création compte)
  // Ici on ne peut pas insérer dans employees car l'ID n'existe pas encore.
  // On pourra rajouter une étape après confirmation email ou dans un trigger.

  const btn = document.getElementById('btn-register')
  btn.disabled = true
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création…'

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: { data: metadata }
  })

  if (error) {
    showToast('Erreur : ' + error.message, 'error')
    btn.disabled = false
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte'
    return
  }

  // Succès
  showToast('Compte créé ! Vérifiez votre email pour confirmer (si demandé).', 'success')
  
  // Si le compte est créé mais que l'utilisateur n'est pas encore confirmé (email confirmation)
  // On le redirige vers login après quelques secondes
  setTimeout(() => {
    window.location.href = `login.html?email=${encodeURIComponent(email)}&role=${currentRole}`
  }, 2000)
}

// Si déjà connecté, rediriger vers dashboard
getCurrentUser().then(user => {
  if (user) redirectToDashboard(user.role)
})

// Pré-remplir le rôle depuis l'URL
const urlParams = new URLSearchParams(window.location.search)
if (urlParams.get('role') === 'chauffeur') {
  const chauffeurTab = document.querySelector('.role-tab[data-role="chauffeur"]')
  if (chauffeurTab) setRole('chauffeur', chauffeurTab)
}
</script>
</body>
</html>
