<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Inscription | LOC'RÉATION SAS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/main.css">
<style>body{background:var(--bg-page);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}.reg-card{background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:580px;overflow:hidden}.reg-header{background:linear-gradient(135deg,var(--primary),#1B3A6B);padding:32px 36px;text-align:center}.reg-header h1{font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:4px}.reg-header p{font-size:.87rem;color:rgba(255,255,255,.7)}.role-tabs{display:flex;gap:6px;background:rgba(255,255,255,.1);padding:5px;border-radius:var(--radius);margin-top:20px}.role-tab{flex:1;padding:9px;text-align:center;border-radius:calc(var(--radius) - 2px);font-size:.8rem;font-weight:600;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;border:none;background:none;font-family:'Poppins',sans-serif}.role-tab.active{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3)}.reg-body{padding:32px 36px}.sec-div{font-size:.8rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;padding-bottom:10px;border-bottom:1px solid var(--primary-xlight);margin-bottom:18px}.chauffeur-extra{display:none}.chauffeur-extra.show{display:block}.cgv-wrap{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}.cgv-wrap input{width:18px;height:18px;margin-top:2px;accent-color:var(--primary);flex-shrink:0}.cgv-wrap label{font-size:.82rem;color:var(--gray)}.login-link{text-align:center;font-size:.85rem;color:var(--gray);margin-top:16px}.login-link a{color:var(--primary);font-weight:700}@media(max-width:600px){.reg-body{padding:24px 20px}.form-row{grid-template-columns:1fr}}</style>
</head><body>
<div class="reg-card">
  <div class="reg-header">
    <h1>⚡ LOC'RÉATION SAS</h1>
    <p>Créez votre compte et rejoignez la plateforme</p>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('client',this)"><i class="fas fa-user"></i>Compte Client</button>
      <button class="role-tab" onclick="setRole('chauffeur',this)"><i class="fas fa-car"></i>Compte Chauffeur</button>
    </div>
  </div>
  <div class="reg-body">
    <div class="form-row">
      <div class="form-group"><label class="form-label">Prénom <span style="color:var(--red)">*</span></label><div class="form-icon-wrap"><i class="fas fa-user"></i><input type="text" id="prenom" class="form-control" placeholder="Jean"></div></div>
      <div class="form-group"><label class="form-label">Nom <span style="color:var(--red)">*</span></label><div class="form-icon-wrap"><i class="fas fa-user"></i><input type="text" id="nom" class="form-control" placeholder="Dupont"></div></div>
    </div>
    <div class="form-group"><label class="form-label">Adresse email <span style="color:var(--red)">*</span></label><div class="form-icon-wrap"><i class="fas fa-envelope"></i><input type="email" id="email" class="form-control" placeholder="votre@email.com"></div></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Téléphone</label><div class="form-icon-wrap"><i class="fas fa-phone"></i><input type="tel" id="tel" class="form-control" placeholder="+33 6 XX XX XX XX"></div></div>
      <div class="form-group"><label class="form-label">Ville</label><div class="form-icon-wrap"><i class="fas fa-city"></i><input type="text" id="ville" class="form-control" placeholder="Paris"></div></div>
    </div>
    <div class="form-group"><label class="form-label">Mot de passe <span style="color:var(--red)">*</span></label><div class="form-icon-wrap"><i class="fas fa-lock"></i><input type="password" id="password" class="form-control" placeholder="Min. 6 caractères"><i class="fas fa-eye toggle-pwd" onclick="togglePwd()"></i></div></div>
    <div class="form-group"><label class="form-label">Confirmer le mot de passe <span style="color:var(--red)">*</span></label><div class="form-icon-wrap"><i class="fas fa-lock"></i><input type="password" id="confirm" class="form-control" placeholder="Répétez votre mot de passe"></div></div>
    <div class="chauffeur-extra" id="chauffeur-extra">
      <div class="sec-div"><i class="fas fa-car"></i> Informations Véhicule</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Marque &amp; Modèle</label><div class="form-icon-wrap"><i class="fas fa-car-alt"></i><input type="text" id="voiture" class="form-control" placeholder="Mercedes Classe E"></div></div>
        <div class="form-group"><label class="form-label">Plaque d'immatriculation</label><div class="form-icon-wrap"><i class="fas fa-id-card"></i><input type="text" id="plaque" class="form-control" placeholder="AA-123-BB"></div></div>
      </div>
      <div class="form-group"><label class="form-label">N° Carte Professionnelle VTC</label><div class="form-icon-wrap"><i class="fas fa-id-badge"></i><input type="text" id="carte-vtc" class="form-control" placeholder="VTC-2026-XXXXX"></div></div>
    </div>
    <div class="cgv-wrap"><input type="checkbox" id="cgv"><label for="cgv">J'accepte les <a href="../index.html" style="color:var(--primary);font-weight:600">Conditions Générales d'Utilisation</a> et la Politique de Confidentialité.</label></div>
    <button class="btn btn-primary btn-full" onclick="doRegister()"><i class="fas fa-user-plus"></i>Créer mon compte</button>
    <div class="login-link">Déjà inscrit ? <a href="login.html">Se connecter</a></div>
  </div>
</div>
<script type="module">
import {supabase,showToast,getCurrentUser,redirectToDashboard} from '../assets/js/supabase.js'
let currentRole='client'
function setRole(r,el){currentRole=r;document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('chauffeur-extra').classList.toggle('show',r==='chauffeur')}
function togglePwd(){const i=document.getElementById('password');i.type=i.type==='password'?'text':'password'}
async function doRegister(){
  const prenom=document.getElementById('prenom').value.trim()
  const nom=document.getElementById('nom').value.trim()
  const email=document.getElementById('email').value.trim()
  const tel=document.getElementById('tel').value.trim()
  const ville=document.getElementById('ville').value.trim()
  const password=document.getElementById('password').value
  const confirm=document.getElementById('confirm').value
  const cgv=document.getElementById('cgv').checked
  if(!prenom||!nom||!email||!password){showToast('Remplissez tous les champs obligatoires.','error');return}
  if(password.length<6){showToast('Mot de passe : minimum 6 caractères.','warning');return}
  if(password!==confirm){showToast('Les mots de passe ne correspondent pas.','error');return}
  if(!cgv){showToast('Acceptez les CGU pour continuer.','warning');return}
  const {data,error}=await supabase.auth.signUp({email,password,options:{data:{role:currentRole,prenom,nom,tel:tel||null,ville:ville||'Paris'}}})
  if(error){showToast(error.message,'error');return}
  showToast('Compte créé ! Vérifiez votre email si demandé.','success')
  const map={client:'../client/dashboard.html',chauffeur:'../driver/dashboard.html'}
  setTimeout(()=>window.location.href=map[currentRole],1500)
}
window.setRole=setRole;window.togglePwd=togglePwd;window.doRegister=doRegister
getCurrentUser().then(u=>{if(u)redirectToDashboard(u.role)})
const p=new URLSearchParams(location.search)
if(p.get('role')){const el=document.querySelector(`[onclick*="${p.get('role')}"]`);if(el)el.click()}
</script></body></html>
