<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Devis | LOC'RÉATION SAS</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="stylesheet" href="../assets/css/main.css"></head><body style="background:var(--bg-page);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px"><div class="card" style="max-width:540px;width:100%"><div style="background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:24px;margin:-24px -24px 22px;text-align:center"><div style="font-size:1.2rem;font-weight:800;color:#fff">Demande de Devis</div><div style="font-size:.85rem;color:rgba(255,255,255,.7);margin-top:4px" id="devis-title">LOC'RÉATION SAS</div></div><div class="form-row"><div class="form-group"><label class="form-label">Prénom *</label><div class="form-icon-wrap"><i class="fas fa-user"></i><input type="text" id="d-prenom" class="form-control"></div></div><div class="form-group"><label class="form-label">Nom *</label><div class="form-icon-wrap"><i class="fas fa-user"></i><input type="text" id="d-nom" class="form-control"></div></div></div><div class="form-group"><label class="form-label">Email *</label><div class="form-icon-wrap"><i class="fas fa-envelope"></i><input type="email" id="d-email" class="form-control"></div></div><div class="form-group"><label class="form-label">Téléphone</label><div class="form-icon-wrap"><i class="fas fa-phone"></i><input type="tel" id="d-tel" class="form-control"></div></div><div class="form-group"><label class="form-label">Type de service</label><select id="d-type" class="form-select"><option value="location">Location Immobilière</option><option value="btp">BTP & Construction</option><option value="jardinage">Jardinage</option><option value="autre">Autre</option></select></div><div class="form-group"><label class="form-label">Adresse du projet</label><div class="form-icon-wrap"><i class="fas fa-map-marker-alt"></i><input type="text" id="d-adresse" class="form-control"></div></div><div class="form-group"><label class="form-label">Date souhaitée</label><input type="date" id="d-date" class="form-control"></div><div class="form-group"><label class="form-label">Description *</label><textarea id="d-desc" class="form-control" rows="4" placeholder="Décrivez votre besoin…" style="resize:vertical"></textarea></div><button class="btn btn-primary btn-full" onclick="sendDevis()"><i class="fas fa-paper-plane"></i>Envoyer la demande</button><div style="text-align:center;margin-top:12px"><a href="../index.html" style="font-size:.85rem;color:var(--gray)">← Retour</a></div></div><div id="toast-container"></div><script type="module">
import {supabase,getCurrentUser,showToast} from '../assets/js/supabase.js'
const p=new URLSearchParams(location.search)
if(p.get('type'))document.getElementById('d-type').value=p.get('type')
async function sendDevis(){
  const prenom=document.getElementById('d-prenom').value.trim(),nom=document.getElementById('d-nom').value.trim(),email=document.getElementById('d-email').value.trim(),desc=document.getElementById('d-desc').value.trim()
  if(!prenom||!nom||!email||!desc){showToast('Remplissez les champs obligatoires.','error');return}
  const user=await getCurrentUser()
  const {error}=await supabase.from('service_requests').insert({client_id:user?.id||'00000000-0000-0000-0000-000000000000',service_type:document.getElementById('d-type').value,description:desc,adresse:document.getElementById('d-adresse').value,date_souhaitee:document.getElementById('d-date').value||null,statut:'en_attente'})
  if(error){showToast('Erreur. Vérifiez votre connexion.','error');return}
  showToast('Demande envoyée ! Nous vous contactons sous 48h.','success')
  setTimeout(()=>window.location.href='../index.html',2500)
}
window.sendDevis=sendDevis
</script></body></html>
