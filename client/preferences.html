      <div class="form-group"><label class="form-label">Volume : <span id="vv" style="color:var(--primary);font-weight:700">30%</span></label>
        <input type="range" min="0" max="100" value="30" id="pref-vol" style="width:100%;accent-color:var(--primary)" oninput="document.getElementById('vv').textContent=this.value+'%'"></div>
      <div class="form-group"><label class="form-label">Ambiance musicale</label>
        <select id="pref-music" class="form-select"><option value="silence">🔇 Silence</option><option value="jazz">🎷 Jazz</option><option value="pop">🎵 Pop</option><option value="classique">🎻 Classique</option><option value="lofi">🎧 Lo-Fi</option></select></div>

  </div>
  <div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-title" style="margin-bottom:16px"><i class="fas fa-user-friends" style="color:var(--primary);margin-right:8px"></i>Options voyage</div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--gray-xlight)"><div><div style="font-size:.87rem;font-weight:500">Animaux acceptés</div></div><label class="toggle-switch"><input type="checkbox" id="pref-pets"><span class="toggle-slider"></span></label></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--gray-xlight)"><div><div style="font-size:.87rem;font-weight:500">Siège bébé</div></div><label class="toggle-switch"><input type="checkbox" id="pref-baby"><span class="toggle-slider"></span></label></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0"><div><div style="font-size:.87rem;font-weight:500">PMR</div></div><label class="toggle-switch"><input type="checkbox" id="pref-pmr"><span class="toggle-slider"></span></label></div>
    </div>
    <div class="card"><div class="card-title" style="margin-bottom:10px">Note pour les chauffeurs</div>
      <textarea id="pref-note" rows="3" class="form-control" placeholder="Message transmis au chauffeur…"></textarea></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-outline-gray" onclick="loadPrefs()"><i class="fas fa-undo"></i>Réinitialiser</button>

</div>
<div id="toast-container"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
import {supabase,getCurrentUser,requireAuth,logout,formatPrice,formatDate,formatDateTime,formatInitials,showToast,hideLoader,getWallet,debitWallet,creditWallet,searchAddress,calculateRidePrice} from '../assets/js/supabase.js'
async function _init(){
  const user=await requireAuth()
  if(!user)return
  document.getElementById('nav-av').textContent=formatInitials(user.prenom,user.nom)
  document.getElementById('nav-nm').textContent=user.prenom+' '+user.nom
  document.getElementById('nav-rl').textContent=user.role
  document.getElementById('sb-av').textContent=formatInitials(user.prenom,user.nom)
  document.getElementById('sb-nm').textContent=user.prenom+' '+user.nom
  document.getElementById('sb-rl').textContent=user.role
  document.getElementById('logout-btn').onclick=()=>logout()
  document.getElementById('logout-link').onclick=(e)=>{e.preventDefault();logout()}
  hideLoader()
  if(typeof pageInit==='function') await pageInit(user)
}

async function pageInit(user){
  const {data}=await supabase.from('client_preferences').select('*').eq('client_id',user.id).single()
  if(data){
    if(data.temperature){document.getElementById('pref-temp').value=data.temperature;document.getElementById('tv').textContent=data.temperature+'°C'}
    if(data.volume!==null){document.getElementById('pref-vol').value=data.volume;document.getElementById('vv').textContent=data.volume+'%'}
    if(data.music_genre)document.getElementById('pref-music').value=data.music_genre
    if(data.pets_allowed)document.getElementById('pref-pets').checked=data.pets_allowed
    if(data.baby_seat)document.getElementById('pref-baby').checked=data.baby_seat
    if(data.note_chauffeur)document.getElementById('pref-note').value=data.note_chauffeur
  }
}
async function savePrefs(){
  const user=await getCurrentUser()
  await supabase.from('client_preferences').upsert({client_id:user.id,temperature:parseInt(document.getElementById('pref-temp').value),volume:parseInt(document.getElementById('pref-vol').value),music_genre:document.getElementById('pref-music').value,pets_allowed:document.getElementById('pref-pets').checked,baby_seat:document.getElementById('pref-baby').checked,note_chauffeur:document.getElementById('pref-note').value})
  showToast('Préférences sauvegardées !','success')
}
async function loadPrefs(){const user=await getCurrentUser();await pageInit(user);showToast('Réinitialisé.','info')}
window.savePrefs=savePrefs;window.loadPrefs=loadPrefs

_init()
</script></body></html>
