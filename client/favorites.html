  <main class="main-content">
<div class="stats-grid">
  <div class="stat-card"><div class="stat-icon red"><i class="fas fa-heart"></i></div><div><div class="stat-value" id="f-nb">0</div><div class="stat-label">Favoris</div></div></div>
  <div class="stat-card"><div class="stat-icon green"><i class="fas fa-circle"></i></div><div><div class="stat-value" id="f-online">0</div><div class="stat-label">En ligne maintenant</div></div></div>
</div>
<div class="card">
  <div class="card-title" style="margin-bottom:16px">Chauffeurs disponibles</div>
  <div id="drivers-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px"></div>
  <div class="empty-state" id="drivers-empty" style="display:none"><i class="fas fa-users"></i><h3>Aucun chauffeur disponible</h3></div>
</div>
</main>
</div>
<div id="toast-container"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
import {supabase,getCurrentUser,requireAuth,logout,formatPrice,formatDate,formatDateTime,formatInitials,showToast,hideLoader,getWallet,debitWallet,creditWallet,searchAddress,calculateRidePrice} from '../assets/js/supabase.js'
async function _init(){
  const user=await requireAuth()
  if(!user)return
  document.getElementById('nav-av').textContent=formatInitials(user.prenom,user.nom)
  document.getElementById('nav-nm').textContent=user.prenom+' '+user.nom
  document.getElementById('nav-rl').textContent=user.role
  document.getElementById('sb-av').textContent=formatInitials(user.prenom,user.nom)
  document.getElementById('sb-nm').textContent=user.prenom+' '+user.nom
  document.getElementById('sb-rl').textContent=user.role
  document.getElementById('logout-btn').onclick=()=>logout()
  document.getElementById('logout-link').onclick=(e)=>{e.preventDefault();logout()}
  hideLoader()
  if(typeof pageInit==='function') await pageInit(user)
}

async function pageInit(user){
  const [{data:favs},{data:drivers},{data:locs}]=await Promise.all([
    supabase.from('favorite_drivers').select('driver_id').eq('client_id',user.id),
    supabase.from('profiles').select('*').eq('role','chauffeur').eq('actif',true),
    supabase.from('driver_locations').select('chauffeur_id').eq('is_online',true)
  ])
  const favIds=favs?.map(f=>f.driver_id)||[]
  const onlineIds=locs?.map(l=>l.chauffeur_id)||[]
  document.getElementById('f-nb').textContent=favIds.length
  document.getElementById('f-online').textContent=onlineIds.length
  const grid=document.getElementById('drivers-grid'),em=document.getElementById('drivers-empty')
  if(!drivers?.length){em.style.display='block';return}
  grid.innerHTML=drivers.map(d=>`<div style="background:#fff;border:1.5px solid ${favIds.includes(d.id)?'var(--gold)':'var(--gray-light)'};border-radius:var(--radius-xl);padding:18px;box-shadow:var(--shadow-sm)">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--primary-xlight);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;border:2px solid var(--gold)">${formatInitials(d.prenom,d.nom)}</div>
      <div><div style="font-weight:700">${d.prenom} ${d.nom}</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:.75rem">
          <span class="status-dot ${onlineIds.includes(d.id)?'status-online':'status-offline'}"></span>
          <span style="color:var(--gray)">${onlineIds.includes(d.id)?'En ligne':'Hors ligne'}</span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" style="flex:1" onclick="window.location.href='dashboard.html?driver=${d.id}'"><i class="fas fa-bolt"></i>Commander</button>
      <button class="btn ${favIds.includes(d.id)?'btn-danger':'btn-outline'} btn-sm" onclick="toggleFav('${d.id}','${user.id}',${favIds.includes(d.id)},this)"><i class="fas fa-heart"></i></button>
    </div>
  </div>`).join('')
}
async function toggleFav(dId,uId,isFav,btn){
  if(isFav){await supabase.from('favorite_drivers').delete().eq('client_id',uId).eq('driver_id',dId);showToast('Retiré des favoris','warning')}
  else{await supabase.from('favorite_drivers').insert({client_id:uId,driver_id:dId});showToast('Ajouté aux favoris ❤️','success')}
  const user=await getCurrentUser();await pageInit(user)
}
window.toggleFav=toggleFav

_init()
</script></body></html>
